services:
    # --- BACKEND ---
    backend:
        build: .
        container_name: portfolio_backend
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html
        dns:
            - 8.8.8.8
            - 8.8.4.4
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=://render.com # 👈 Host Externo de Render
            - DB_PORT=5432
            - DB_DATABASE=portfolio_zqlb
            - DB_USERNAME=admin
            - DB_PASSWORD=ovGaD5u04yvKIJYHeQgePTvknOtFOMMn
            - DB_SSLMODE=require

        # El comando repara los permisos locales en cada inicio antes de arrancar Apache
        command: >
            sh -c "chown -R www-data:www-data /var/www/html &&
                   chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache || true &&
                   apache2-foreground"
